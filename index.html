<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12th English test hanzx.ai</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f0c29;
    --card: #1a1740;
    --card2: #201d4a;
    --accent: #f7c948;
    --accent2: #ff6b6b;
    --green: #43e97b;
    --blue: #38b2f7;
    --text: #e8e4ff;
    --muted: #9993cc;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #1a1740 0%, #2d2870 100%);
    padding: 22px 16px 18px;
    text-align: center;
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.3rem, 5vw, 2rem);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .header p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    background: #111030;
    padding: 10px 16px 6px;
    position: sticky;
    top: 80px;
    z-index: 99;
    border-bottom: 1px solid #2a2660;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .progress-bar-outer {
    height: 7px;
    background: #2a2660;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff9f43);
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ===== SECTION TABS ===== */
  .section-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 14px;
    scrollbar-width: none;
  }
  .section-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1.5px solid #3a3570;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--accent);
    color: #1a1740;
    border-color: var(--accent);
  }

  /* ===== SECTION ===== */
  .section {
    display: none;
    padding: 10px 10px 0;
  }
  .section.visible { display: block; }
  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--card2);
    border-left: 4px solid var(--accent);
    padding: 8px 14px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 8px 0 10px;
  }

  /* ===== QUESTION CARD ===== */
  .q-card {
    background: var(--card);
    border: 1.5px solid #2f2b60;
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card.correct { border-color: var(--green); }
  .q-card.wrong { border-color: var(--accent2); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px 8px;
  }
  .q-num {
    background: var(--accent);
    color: #1a1740;
    font-weight: 800;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
  }
  .q-text em {
    color: var(--accent);
    font-style: normal;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ===== OPTIONS ===== */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 0 12px 12px;
  }
  .opt-btn {
    background: #141230;
    border: 1.5px solid #2f2b60;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .opt-btn:hover:not(:disabled) {
    background: #2a2660;
    border-color: var(--accent);
    color: var(--accent);
  }
  .opt-btn.selected-correct {
    background: rgba(67,233,123,0.12);
    border-color: var(--green);
    color: var(--green);
  }
  .opt-btn.selected-wrong {
    background: rgba(255,107,107,0.12);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .opt-btn.show-correct {
    background: rgba(67,233,123,0.08);
    border-color: var(--green);
    color: var(--green);
  }
  .opt-btn:disabled { cursor: default; }

  /* ===== STATUS ICON ===== */
  .q-status {
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ===== BOTTOM ACTIONS ===== */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #111030;
    border-top: 2px solid #2a2660;
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    z-index: 200;
  }
  .btn {
    flex: 1;
    font-family: 'Baloo 2', cursive;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #1a1740;
  }
  .btn-primary:hover { background: #ffd83a; }
  .btn-danger {
    background: var(--accent2);
    color: #fff;
  }
  .btn-danger:hover { background: #ff4f4f; }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--blue);
    color: var(--blue);
  }

  /* ===== RESULT MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 28px 22px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 60px rgba(247,201,72,0.2);
    animation: popIn 0.3s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 8px; }
  .modal h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .score-big {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem;
    font-weight: 800;
    color: var(--green);
    line-height: 1;
    margin: 10px 0;
  }
  .score-sub {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: #141230;
    border-radius: 10px;
    padding: 10px 6px;
  }
  .stat-num { font-size: 1.4rem; font-weight: 800; }
  .stat-label { font-size: 0.7rem; color: var(--muted); }
  .stat-box.s-correct .stat-num { color: var(--green); }
  .stat-box.s-wrong .stat-num { color: var(--accent2); }
  .stat-box.s-skip .stat-num { color: var(--blue); }

  .grade-badge {
    display: inline-block;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    padding: 4px 20px;
    border-radius: 30px;
    margin-bottom: 14px;
  }

  .modal-btns { display: flex; gap: 10px; }
  .modal-btns .btn { font-size: 0.85rem; padding: 10px 6px; }

  /* ===== SKIPPED indicator ===== */
  .q-card.skipped-show .q-text::after {
    content: ' ⚠ Unanswered';
    color: var(--blue);
    font-size: 0.75rem;
  }

  /* Unanswered highlight */
  .q-card.unanswered-highlight {
    border-color: var(--blue);
    animation: pulse 0.8s ease 2;
  }
  @keyframes pulse {
    0%,100% { box-shadow: none; }
    50% { box-shadow: 0 0 12px rgba(56,178,247,0.5); }
  }

  /* Section result mini bar */
  .sec-result {
    display: none;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 0 14px 12px;
    text-align: right;
  }
  .sec-result.show { display: block; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 360px) {
    .options { grid-template-columns: 1fr; }
    .opt-btn { font-size: 0.78rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📚 12th English MCQ Test</h1>
  <p>It Department Hanzx.ai &nbsp;|&nbsp; 510 Questions</p>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-text">0 / 510 answered</span>

  </div>
</div>

<div class="section-tabs" id="tabs"></div>

<div id="sections-container"></div>

<div class="bottom-bar">
  <button class="btn btn-primary" onclick="submitTest()">✅ Submit Test</button>

  <button class="btn btn-danger" onclick="resetTest()">🔄 Reset</button>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-emoji" id="res-emoji">🎉</div>

    <div class="score-big" id="res-score">0%</div>

    <div class="stats-grid">
      <div class="stat-box s-correct">
        <div class="stat-num" id="res-correct">0</div>
        <div class="stat-label">✅ Correct</div>
      </div>
      <div class="stat-box s-wrong">
        <div class="stat-num" id="res-wrong">0</div>
        <div class="stat-label">❌ Wrong</div>

      <div class="stat-box s-skip">
        <div class="stat-num" id="res-skip">0</div>

    <div class="modal-btns">
      <button class="btn btn-primary" onclick="closeModal()">📋 Review</button>
      <button class="btn btn-danger" onclick="resetTest()">🔄 Retry</button>
    </div>
  </div>
</div>

      {q:'Prisoner was hung yesterday.',opts:['hung','was hung','was hang','was hanged'],ans:3},
      {q:'Talks nonsense often.',opts:['often nonsense','often talks nonsense','seldom nonsense','talking often'],ans:1},
      {q:'Can you open this knot?',opts:['May you','opening','untied','untie'],ans:3},
      {q:'Worth reading book.',opts:['book worth reading','worth read','reading worth','worth read'],ans:0},
      {q:'Either you or I are wrong.',opts:['me are','I am','I were','I is'],ans:1},
      {q:'Captain as well as players are working.',opts:['have been','is working','were working','are working'],ans:3},
      {q:'It is I who is to blame.',opts:['me is','me am','I am','I are'],ans:2},
    ]
  }
];

// ============================================================
// STATE
// ============================================================
const totalQ = sections.reduce((a,s) => a + s.qs.length, 0);
const answers = {}; // key: "secId-qi", val: chosen index
let submitted = false;

// ============================================================
// BUILD UI
// ============================================================
function buildUI() {
  const tabContainer = document.getElementById('tabs');
  const sectionsContainer = document.getElementById('sections-container');
  tabContainer.innerHTML = '';
  sectionsContainer.innerHTML = '';

  sections.forEach((sec, si) => {
    // Tab
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (si === 0 ? ' active' : '');
    btn.textContent = sec.title.split('(')[0].trim();
    btn.onclick = () => switchTab(sec.id);
    tabContainer.appendChild(btn);

    // Section div
    const sdiv = document.createElement('div');
    sdiv.className = 'section' + (si === 0 ? ' visible' : '');
    sdiv.id = 'sec-' + sec.id;

    const stitle = document.createElement('div');
    stitle.className = 'section-title';
    stitle.textContent = '📖 ' + sec.title;
    sdiv.appendChild(stitle);

    const secRes = document.createElement('div');
    secRes.className = 'sec-result';
    secRes.id = 'secres-' + sec.id;
    sdiv.appendChild(secRes);

    sec.qs.forEach((q, qi) => {
      sdiv.appendChild(buildCard(sec.id, qi, q));
    });

    sectionsContainer.appendChild(sdiv);
  });
}

function buildCard(secId, qi, q) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${secId}-${qi}`;

  const header = document.createElement('div');
  header.className = 'q-header';

  const num = document.createElement('span');
  num.className = 'q-num';
  num.textContent = `Q${qi + 1}`;

  const qtext = document.createElement('div');
  qtext.className = 'q-text';
  qtext.innerHTML = q.q;

  const status = document.createElement('span');
  status.className = 'q-status';
  status.id = `status-${secId}-${qi}`;
  status.textContent = '';

  header.appendChild(num);
  header.appendChild(qtext);
  header.appendChild(status);
  card.appendChild(header);

  const opts = document.createElement('div');
  opts.className = 'options';

  const labels = ['A','B','C','D'];
  q.opts.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.id = `opt-${secId}-${qi}-${oi}`;
    btn.innerHTML = `<b>${labels[oi]}.</b> ${opt}`;
    btn.onclick = () => selectAnswer(secId, qi, oi, q.ans);
    opts.appendChild(btn);
  });

  card.appendChild(opts);
  return card;
}

function switchTab(secId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', sections[i].id === secId);
  });
  document.getElementById('sec-' + secId).classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// ANSWER SELECTION
// ============================================================
function selectAnswer(secId, qi, chosen, correct) {
  if (submitted) return;
  const key = `${secId}-${qi}`;
  // Deselect previous
  const sec = sections.find(s => s.id === secId);
  sec.qs[qi].opts.forEach((_, oi) => {
    const btn = document.getElementById(`opt-${secId}-${qi}-${oi}`);
    btn.classList.remove('selected-correct','selected-wrong');
  });

  answers[key] = chosen;
  const btn = document.getElementById(`opt-${secId}-${qi}-${chosen}`);
  if (chosen === correct) {
    btn.classList.add('selected-correct');
  } else {
    btn.classList.add('selected-wrong');
  }
  updateProgress();
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgress() {
  const answered = Object.keys(answers).length;
  const pct = Math.round((answered / totalQ) * 100);
  document.getElementById('prog-text').textContent = `${answered} / ${totalQ} answered`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
}

// ============================================================
// SUBMIT
// ============================================================
function submitTest() {
  const answered = Object.keys(answers).length;
  const unanswered = totalQ - answered;
  if (unanswered > 0) {
    const go = confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`);
    if (!go) return;
  }

  submitted = true;
  let correct = 0, wrong = 0, skipped = 0;

  sections.forEach(sec => {
    let secCorrect = 0, secWrong = 0, secSkip = 0;
    sec.qs.forEach((q, qi) => {
      const key = `${sec.id}-${qi}`;
      const card = document.getElementById(`card-${sec.id}-${qi}`);
      const statusEl = document.getElementById(`status-${sec.id}-${qi}`);

      // Disable all buttons
      q.opts.forEach((_, oi) => {
        document.getElementById(`opt-${sec.id}-${qi}-${oi}`).disabled = true;
      });

      if (answers[key] === undefined) {
        // Skipped
        skipped++;
        secSkip++;
        card.classList.add('skipped-show');
        // Show correct
        const correctBtn = document.getElementById(`opt-${sec.id}-${qi}-${q.ans}`);
        correctBtn.classList.add('show-correct');
        statusEl.textContent = '⚠️';
      } else if (answers[key] === q.ans) {
        correct++;
        secCorrect++;
        card.classList.add('correct');
        statusEl.textContent = '✅';
      } else {
        wrong++;
        secWrong++;
        card.classList.add('wrong');
        // Show correct answer
        const correctBtn = document.getElementById(`opt-${sec.id}-${qi}-${q.ans}`);
        correctBtn.classList.add('show-correct');
        statusEl.textContent = '❌';
      }
    });

    // Section result
    const secTotal = sec.qs.length;
    const secRes = document.getElementById(`secres-${sec.id}`);
    secRes.innerHTML = `Section: ✅ ${secCorrect} | ❌ ${secWrong} | ⚠ ${secSkip} &nbsp;|&nbsp; Score: <b style="color:var(--green)">${secTotal > 0 ? Math.round(secCorrect/secTotal*100) : 0}%</b>`;
    secRes.classList.add('show');
  });

  showResult(correct, wrong, skipped);
}

// ============================================================
// RESULT
// ============================================================
function showResult(correct, wrong, skipped) {
  const pct = Math.round((correct / totalQ) * 100);
  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-sub').textContent = `${correct} out of ${totalQ} correct`;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skip').textContent = skipped;

  let grade, emoji, color;
  if (pct >= 90) { grade='A+'; emoji='🏆'; color='#43e97b'; }
  else if (pct >= 80) { grade='A'; emoji='🎉'; color='#43e97b'; }
  else if (pct >= 70) { grade='B'; emoji='😊'; color='#f7c948'; }
  else if (pct >= 60) { grade='C'; emoji='🙂'; color='#ff9f43'; }
  else if (pct >= 50) { grade='D'; emoji='😐'; color='#ff6b6b'; }
  else { grade='F'; emoji='😟'; color='#ff6b6b'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-grade').textContent = 'Grade: ' + grade;
  document.getElementById('res-grade').style.background = color + '22';
  document.getElementById('res-grade').style.color = color;
  document.getElementById('res-grade').style.border = '2px solid ' + color;

  document.getElementById('result-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('result-modal').classList.remove('show');
}

// ============================================================
// REVIEW UNANSWERED
// ============================================================
function reviewUnanswered() {
  // Find first unanswered
  for (const sec of sections) {
    for (let qi = 0; qi < sec.qs.length; qi++) {
      const key = `${sec.id}-${qi}`;
      if (answers[key] === undefined) {
        switchTab(sec.id);
        setTimeout(() => {
          const card = document.getElementById(`card-${sec.id}-${qi}`);
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.classList.add('unanswered-highlight');
          setTimeout(() => card.classList.remove('unanswered-highlight'), 1800);
        }, 300);
        return;
      }
    }
  }
  alert('✅ All questions answered!');
}

// ============================================================
// RESET
// ============================================================
function resetTest() {
  if (!confirm('Reset all answers and start fresh?')) return;
  submitted = false;
  for (const k in answers) delete answers[k];
  buildUI();
  updateProgress();
  document.getElementById('result-modal').classList.remove('show');
}

// ============================================================
// INIT
// ============================================================
buildUI();
updateProgress();
</script>
</body>
</html>
